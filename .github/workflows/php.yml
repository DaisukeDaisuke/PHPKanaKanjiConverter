name: phpunit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  phpunit:
    strategy:
      fail-fast: false
      matrix:
        php: [ "8.4" ]

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        coverage: none

    - name: Restore Composer cache
      id: composer-cache
      uses: actions/cache/restore@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}

    - name: Install dependencies
      run: |
        (test -d vendor && composer dump-autoload) || composer install --prefer-dist --no-progress --ignore-platform-reqs

    - name: PHPUnit test
      run: vendor/bin/phpunit test

    - name: Save Composer cache
      if: always() && steps.composer-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
